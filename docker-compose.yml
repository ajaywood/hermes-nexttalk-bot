version: "3.9"
services:
  hermes-nexttalk-bot:
    build: .
    image: hermes-nexttalk-bot:latest
    container_name: hermes-nexttalk-bot
    restart: unless-stopped
    ports:
      - "7861:7861"
    volumes:
      - /mnt/user/appdata/hermes-nexttalk-bot:/data
    environment:
      - TZ=Australia/Adelaide
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - NC_URL=${NC_URL:-}
      - NC_USER=${NC_USER:-}
      - NC_PASS=${NC_PASS:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - WEBUI_PASSWORD=${WEBUI_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7861/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
