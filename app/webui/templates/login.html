<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Hermes NexTalk Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f1117; color: #e0e0e0; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #1a1d2e; border: 1px solid #2d3561; border-radius: 12px; padding: 40px; width: 100%; max-width: 380px; }
        .login-brand { text-align: center; margin-bottom: 32px; }
        .login-brand .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }
        .login-brand h1 { font-size: 1.2rem; font-weight: 700; }
        .login-brand p { font-size: 0.8rem; color: #888; margin-top: 4px; }
        label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; }
        input[type=password] { width: 100%; padding: 10px 14px; background: #252840; border: 1px solid #2d3561; border-radius: 6px; color: #e0e0e0; font-size: 0.9rem; outline: none; margin-bottom: 20px; }
        input[type=password]:focus { border-color: #6c63ff; box-shadow: 0 0 0 2px rgba(108,99,255,0.2); }
        button { width: 100%; padding: 10px; background: #6c63ff; color: white; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #5a52d5; }
        .error { background: rgba(255,71,87,0.15); border: 1px solid #ff4757; color: #ff4757; padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-brand">
            <span class="icon">⚡</span>
            <h1>NexTalk Bot</h1>
            <p>Hermes Nextcloud Talk Manager</p>
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autofocus placeholder="Enter password">
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
